name: Build And Store Artifacts In CNB

on:
  workflow_dispatch:
    inputs:
      version:
        description: "制品版本号，留空则使用日期+短SHA"
        required: false
        type: string
  push:
    branches:
      - v3.x
      - main

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare Config And Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      cnb_registry: ${{ steps.config.outputs.cnb_registry }}
      cnb_namespace: ${{ steps.config.outputs.cnb_namespace }}
      java_version: ${{ steps.config.outputs.java_version }}
      static_repo_url: ${{ steps.config.outputs.static_repo_url }}
      static_repo_path: ${{ steps.config.outputs.static_repo_path }}
      backend_name: ${{ steps.config.outputs.backend_name }}
      backend_context: ${{ steps.config.outputs.backend_context }}
      backend_dockerfile: ${{ steps.config.outputs.backend_dockerfile }}
      frontend_artifact: ${{ steps.config.outputs.frontend_artifact }}
      frontend_context: ${{ steps.config.outputs.frontend_context }}
      frontend_node_version: ${{ steps.config.outputs.frontend_node_version }}
      frontend_pnpm_version: ${{ steps.config.outputs.frontend_pnpm_version }}
      frontend_install_command: ${{ steps.config.outputs.frontend_install_command }}
      frontend_build_command: ${{ steps.config.outputs.frontend_build_command }}
    steps:
      - uses: actions/checkout@v4

      - id: config
        name: Load Deploy Config
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source .deploy/config.env
          set +a

          backend="$(jq -c '.[0]' .deploy/services.json)"
          frontend="$(jq -c '.[0]' .deploy/frontend.json)"

          echo "cnb_registry=${CNB_REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "cnb_namespace=${CNB_NAMESPACE}" >> "$GITHUB_OUTPUT"
          echo "java_version=${JAVA_VERSION}" >> "$GITHUB_OUTPUT"
          echo "static_repo_url=${STATIC_REPO_URL}" >> "$GITHUB_OUTPUT"
          echo "static_repo_path=${STATIC_REPO_PATH}" >> "$GITHUB_OUTPUT"

          echo "backend_name=$(jq -r '.name' <<< "${backend}")" >> "$GITHUB_OUTPUT"
          echo "backend_context=$(jq -r '.context' <<< "${backend}")" >> "$GITHUB_OUTPUT"
          echo "backend_dockerfile=$(jq -r '.dockerfile' <<< "${backend}")" >> "$GITHUB_OUTPUT"

          echo "frontend_artifact=$(jq -r '.artifact' <<< "${frontend}")" >> "$GITHUB_OUTPUT"
          echo "frontend_context=$(jq -r '.context' <<< "${frontend}")" >> "$GITHUB_OUTPUT"
          echo "frontend_node_version=$(jq -r '.node_version' <<< "${frontend}")" >> "$GITHUB_OUTPUT"
          echo "frontend_pnpm_version=$(jq -r '.pnpm_version' <<< "${frontend}")" >> "$GITHUB_OUTPUT"
          echo "frontend_install_command=$(jq -r '.npm_install_command' <<< "${frontend}")" >> "$GITHUB_OUTPUT"
          echo "frontend_build_command=$(jq -r '.npm_build_command' <<< "${frontend}")" >> "$GITHUB_OUTPUT"

      - id: version
        name: Generate Version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="$(date +%Y%m%d)-${GITHUB_SHA::8}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}"

  frontend:
    name: Build Frontend Zip
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      download_url: ${{ steps.push_static.outputs.download_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.prepare.outputs.frontend_node_version }}

      - name: Setup pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@${{ needs.prepare.outputs.frontend_pnpm_version }} --activate

      - name: Build frontend
        working-directory: ${{ needs.prepare.outputs.frontend_context }}
        env:
          VITE_WECOM_OAUTH_URL: ${{ secrets.VITE_WECOM_OAUTH_URL }}
        shell: bash
        run: |
          ${{ needs.prepare.outputs.frontend_install_command }}
          ${{ needs.prepare.outputs.frontend_build_command }}

      - name: Package frontend zip
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          ARTIFACT="${{ needs.prepare.outputs.frontend_artifact }}"
          ZIP_NAME="${ARTIFACT}-${VERSION}.zip"
          cd "${{ needs.prepare.outputs.frontend_context }}/dist"
          zip -r "${GITHUB_WORKSPACE}/${ZIP_NAME}" . -x "*.gz"
          cd "${GITHUB_WORKSPACE}"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Upload frontend zip to workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 7

      - name: Push frontend zip to CNB static repo
        id: push_static
        shell: bash
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
          STATIC_REPO_URL: ${{ needs.prepare.outputs.static_repo_url }}
          STATIC_REPO_PATH: ${{ needs.prepare.outputs.static_repo_path }}
          VERSION: ${{ needs.prepare.outputs.version }}
          ARTIFACT: ${{ needs.prepare.outputs.frontend_artifact }}
          ZIP_NAME: ${{ env.ZIP_NAME }}
        run: |
          set -euo pipefail
          if [ -z "${CNB_TOKEN}" ]; then
            echo "GitHub Secret CNB_TOKEN 未配置"
            exit 1
          fi

          basic="$(printf 'cnb:%s' "${CNB_TOKEN}" | base64 -w0)"
          git -c "http.https://cnb.cool/.extraheader=AUTHORIZATION: basic ${basic}" \
            clone "${STATIC_REPO_URL}" _static_repo

          cd _static_repo
          default_branch="$(git symbolic-ref --short refs/remotes/origin/HEAD 2>/dev/null | sed 's#^origin/##' || true)"
          if [ -z "${default_branch}" ]; then
            default_branch="$(git branch --show-current || true)"
          fi
          if [ -z "${default_branch}" ]; then
            default_branch="master"
            git checkout -B "${default_branch}"
          fi

          git switch --orphan latest-static
          git rm -rf --cached . || true
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +

          dest_dir="${STATIC_REPO_PATH}/${VERSION}"
          mkdir -p "${dest_dir}"
          cp "${GITHUB_WORKSPACE}/${ZIP_NAME}" "${dest_dir}/${ARTIFACT}.zip"

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add "${STATIC_REPO_PATH}"

          git commit -m "chore: store frontend ${VERSION} [skip ci]"
          git branch -M "${default_branch}"
          git -c "http.https://cnb.cool/.extraheader=AUTHORIZATION: basic ${basic}" \
            push --force origin "HEAD:${default_branch}"

          download_url="${STATIC_REPO_URL}/-/git/raw/${default_branch}/${dest_dir}/${ARTIFACT}.zip?download=true"
          echo "download_url=${download_url}" >> "$GITHUB_OUTPUT"
          echo "Frontend ZIP download URL: ${download_url}"

  backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ needs.prepare.outputs.java_version }}
          cache: maven

      - name: Build backend
        shell: bash
        run: |
          ./mvnw -B clean package -DskipTests -DskipAntRunForJenkins=true -pl '!frontend'
          rm -rf backend/app/target/dependency
          mkdir -p backend/app/target/dependency
          APP_JAR="$(ls backend/app/target/app-*.jar | head -n 1)"
          cd backend/app/target/dependency
          jar -xf "../$(basename "${APP_JAR}")"

      - name: Login to CNB registry
        uses: docker/login-action@v3
        with:
          registry: ${{ needs.prepare.outputs.cnb_registry }}
          username: cnb
          password: ${{ secrets.CNB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and store backend image in CNB registry
        uses: docker/build-push-action@v6
        with:
          context: ${{ needs.prepare.outputs.backend_context }}
          file: ${{ needs.prepare.outputs.backend_dockerfile }}
          push: true
          platforms: linux/amd64
          build-args: |
            MS_VERSION=${{ needs.prepare.outputs.version }}
          tags: |
            ${{ needs.prepare.outputs.cnb_registry }}/${{ needs.prepare.outputs.cnb_namespace }}/${{ needs.prepare.outputs.backend_name }}:${{ needs.prepare.outputs.version }}
            ${{ needs.prepare.outputs.cnb_registry }}/${{ needs.prepare.outputs.cnb_namespace }}/${{ needs.prepare.outputs.backend_name }}:latest

  publish-cnb-version:
    name: Publish Version Info To CNB
    runs-on: ubuntu-latest
    needs:
      - prepare
      - frontend
      - backend
    if: ${{ needs.frontend.result == 'success' && needs.backend.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Push build metadata to CNB repo
        shell: bash
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
          CNB_REGISTRY: ${{ needs.prepare.outputs.cnb_registry }}
          CNB_NAMESPACE: ${{ needs.prepare.outputs.cnb_namespace }}
          BACKEND_NAME: ${{ needs.prepare.outputs.backend_name }}
          FRONTEND_ARTIFACT: ${{ needs.prepare.outputs.frontend_artifact }}
          FRONTEND_URL: ${{ needs.frontend.outputs.download_url }}
        run: |
          set -euo pipefail
          if [ -z "${CNB_TOKEN}" ]; then
            echo "GitHub Secret CNB_TOKEN 未配置"
            exit 1
          fi
          if [ -z "${FRONTEND_URL}" ]; then
            echo "Frontend download URL is empty"
            exit 1
          fi

          CNB_REPO_URL="https://cnb.cool/${CNB_NAMESPACE}"
          BACKEND_IMAGE="${CNB_REGISTRY}/${CNB_NAMESPACE}/${BACKEND_NAME}:${VERSION}"
          BRANCH_NAME="${GITHUB_REF_NAME}"
          AUTHOR="${GITHUB_ACTOR}"
          MSG="$(git log -1 --pretty=format:'%s')"
          MSG_CLEAN="$(printf '%s' "${MSG}" | tr '\n' ' ')"
          PUBLISH_TIME="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          export VERSION BRANCH_NAME AUTHOR MSG_CLEAN PUBLISH_TIME BACKEND_IMAGE FRONTEND_URL

          basic="$(printf 'cnb:%s' "${CNB_TOKEN}" | base64 -w0)"
          git -c "http.https://cnb.cool/.extraheader=AUTHORIZATION: basic ${basic}" \
            clone --depth=1 "${CNB_REPO_URL}" _cnb_version_repo

          cd _cnb_version_repo
          default_branch="$(git symbolic-ref --short refs/remotes/origin/HEAD 2>/dev/null | sed 's#^origin/##' || true)"
          if [ -z "${default_branch}" ]; then
            default_branch="$(git branch --show-current || true)"
          fi
          if [ -z "${default_branch}" ]; then
            default_branch="master"
            git checkout -B "${default_branch}"
          fi

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          python3 - <<'PY'
          from pathlib import Path
          import json
          import os
          import re

          def quote(value):
              return json.dumps(value, ensure_ascii=False)

          backend_version = [
              "##当前测试环境后端版本信息:",
              f"version: {quote(os.environ['VERSION'])}",
              f"branch_name: {quote(os.environ['BRANCH_NAME'])}",
              f"提交人: {quote(os.environ['AUTHOR'])}",
              f"服务提交信息: {quote(os.environ['MSG_CLEAN'])}",
              f"testVersion: {quote(os.environ['BACKEND_IMAGE'])}",
              f"backend_image: {quote(os.environ['BACKEND_IMAGE'])}",
              f"提交时间: {quote(os.environ['PUBLISH_TIME'])}",
          ]
          frontend_version = [
              "##当前测试环境前端版本信息:",
              f"version: {quote(os.environ['VERSION'])}",
              f"branch_name: {quote(os.environ['BRANCH_NAME'])}",
              f"提交人: {quote(os.environ['AUTHOR'])}",
              f"服务提交信息: {quote(os.environ['MSG_CLEAN'])}",
              f"testVersion: {quote(os.environ['FRONTEND_URL'])}",
              f"frontend_url: {quote(os.environ['FRONTEND_URL'])}",
              f"artifact: {quote(os.environ['FRONTEND_ARTIFACT'])}",
              f"提交时间: {quote(os.environ['PUBLISH_TIME'])}",
          ]
          Path("BackendVersion.yml").write_text("\n".join(backend_version) + "\n", encoding="utf-8")
          Path("FrontendVersion.yml").write_text("\n".join(frontend_version) + "\n", encoding="utf-8")

          path = Path(".cnb/web_trigger.yml")
          if not path.exists():
              raise SystemExit(0)

          frontend_events = {"web_trigger_test_frontend", "web_trigger_prod_frontend"}
          backend_events = {"web_trigger_test_backend", "web_trigger_prod_backend"}
          common = {
              "author": os.environ["AUTHOR"],
              "message": os.environ["MSG_CLEAN"],
              "version": os.environ["VERSION"],
              "publish_time": os.environ["PUBLISH_TIME"],
          }

          lines = path.read_text(encoding="utf-8").splitlines(keepends=True)
          output = []
          current_event = None
          in_env = False
          env_indent = 0

          for line in lines:
              stripped = line.lstrip()
              indent = len(line) - len(stripped)
              event_match = re.match(r"\s*event:\s*['\"]?([^'\"\s]+)['\"]?", line)
              if event_match:
                  current_event = event_match.group(1)
                  in_env = False

              if re.match(r"\s*env:\s*$", line):
                  in_env = True
                  env_indent = indent
                  output.append(line)
                  continue

              if in_env and stripped and not stripped.startswith("#") and indent <= env_indent:
                  in_env = False

              if in_env and current_event in frontend_events | backend_events:
                  key_match = re.match(r"^(\s*)(author|message|version|frontend_url|backend_image|publish_time):\s*.*?(\r?\n)?$", line)
                  if key_match:
                      key = key_match.group(2)
                      values = dict(common)
                      if current_event in frontend_events:
                          values["frontend_url"] = os.environ["FRONTEND_URL"]
                      if current_event in backend_events:
                          values["backend_image"] = os.environ["BACKEND_IMAGE"]
                      if key in values:
                          newline = "\n" if line.endswith("\n") else ""
                          line = f"{key_match.group(1)}{key}: {json.dumps(values[key], ensure_ascii=False)}{newline}"

              output.append(line)

          path.write_text("".join(output), encoding="utf-8")
          PY

          git add BackendVersion.yml FrontendVersion.yml
          if [ -f ".cnb/web_trigger.yml" ]; then
            git add .cnb/web_trigger.yml
          fi

          if git diff --cached --quiet; then
            echo "No CNB version metadata changes"
            exit 0
          fi

          git commit -m "chore: update build metadata ${VERSION} [skip ci]"
          git -c "http.https://cnb.cool/.extraheader=AUTHORIZATION: basic ${basic}" \
            push origin "HEAD:${default_branch}"
