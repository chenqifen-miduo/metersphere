# Nacos profile: activate with -UseNacos / spring.profiles.active=nacos
spring.cloud.nacos.config.enabled=true
spring.cloud.nacos.config.server-addr=${NACOS_SERVER_ADDR:127.0.0.1:8848}
spring.cloud.nacos.config.namespace=${NACOS_NAMESPACE:dev}
spring.cloud.nacos.config.group=${NACOS_GROUP:METERSPHERE}
spring.cloud.nacos.config.file-extension=properties
spring.cloud.nacos.config.username=${NACOS_USERNAME:}
spring.cloud.nacos.config.password=${NACOS_PASSWORD:}
spring.cloud.compatibility-verifier.enabled=false
spring.config.import=optional:nacos:${spring.application.name}.properties?group=${spring.cloud.nacos.config.group}&refreshEnabled=true
